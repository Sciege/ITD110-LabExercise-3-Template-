<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Department Management System</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Management System</h2>
      </div>
      <ul class="sidebar-nav">
        <li>
          <a href="index.html"><span class="icon">&#128218;</span> Students</a>
        </li>
        <li>
          <a href="faculty.html"><span class="icon">&#128100;</span> Faculty</a>
        </li>
        <li>
          <a href="course.html"><span class="icon">&#128214;</span> Courses</a>
        </li>
        <li>
          <a href="department.html" class="active"><span class="icon">&#127970;</span> Departments</a>
        </li>
        <li>
          <a href="room.html"><span class="icon">&#128682;</span> Rooms</a>
        </li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="container">
        <h1>Department Management System</h1>

        <div class="form-container">
          <h2 id="form-title">Add New Department</h2>
          <form id="department-form">
            <input type="hidden" id="department-id" />
            <div class="form-group">
              <label for="name">Department Name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="College of Engineering and Information Technology"
                required
              />
            </div>
            <div class="form-group">
              <label for="description">Department Description</label>
              <textarea
                id="description"
                name="description"
                placeholder="Enter a detailed description of the department, including its vision, mission, and academic focus..."
              ></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" id="submit-btn">Add Department</button>
              <button type="button" id="cancel-btn" class="hidden">
                Cancel
              </button>
            </div>
          </form>
        </div>

        <div class="table-container">
          <h2>Department List</h2>
          <table id="department-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="department-tbody"></tbody>
          </table>
          <p id="no-departments" class="hidden">No departments found.</p>
        </div>
      </div>
    </main>

    <script src="js/department.js"></script>
  </body>
</html>
